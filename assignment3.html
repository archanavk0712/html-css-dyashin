<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assignment3Style.css">
</head>
<body>
    <form action="" style="width:fit-content; background-color: rgb(149, 182, 88);">
        <h4>Step 1: Your details</h4>
        <div class="back1">
        <label class="name">Name</label>
        <input type="text" name="" id="name" placeholder="First and last name">
        <br>
        </div>

        <div class="back1">
        <label class="email">Email</label>
        <input type="email" name="" id="email" placeholder="example@domain.com">
        <br>
        </div>
        
        <div class="back1">
        <label class="phone">Phone</label>
        <input type="tel" name="" id="phone" placeholder="Eg. +447500000000">
        <br>
        </div>

        <h4>Step 2: Delivery address</h4>

        <div class="back2">
        <label class="adress" >Address  </label>
        <textarea name="" id="address"></textarea>
        <br>
        </div>

        <div class="back1">
        <label class="postCode">Post code  </label>
        <input type="tel" name="" id="postCode">
        <br>
        </div>

        <div class="back1">
        <label class="country">Country   </label>
        <input type="tel" name="" id="country">
        <br></div>

        <h4>Step 3: Card details</h4>

        <div class="back3">
        <label class="cardType">Card type</label>
        <br>
        <input type="radio" name="cardType" id="visa">
        <img src="assets/assignment3Img1.png" alt="" >
        <label class="visa">Visa</label>

        <input type="radio" name="cardType" id="amEx">
        <img src="assets/assignment3Img2.png" alt="" >
        <label class="amEx">AmEx</label>

        <input type="radio" name="cardType" id="masterCard">
        <img src="assets/assignment3Img3.png" alt="" >
        <label class="masterCard">Mastercard</label>
        <br>
        </div>

        <div class="back1">
        <label class="cardNumber">Card number</label>
        <input type="tel" name="" id="cardNumber">
        <br>3
        </div>

        <div class="back1">
        <label class="securityCode">Security code</label>
        <input type="tel" name="" id="securityCode">
        <br>
        </div>

        <div class="back1">
        <label class="nameOnCard">Name on card</label>
        <input type="text" name="" id="nameOnCard" placeholder="Exact name as on the card">
        <br>
        </div>
        <button style="background-color: rgb(75, 75, 72); color: white; display: flex; justify-content: center; margin: auto; border-radius: 50px;">  BUY IT! </button>
    </form> 
</body>
</html>
